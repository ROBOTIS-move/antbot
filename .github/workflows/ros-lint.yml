# The name of the workflow
name: Lint

# Specifies the events that trigger the workflow
on:
  pull_request:

# Defines a set of jobs to be run as part of the workflow
jobs:
  ament_lint:
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-jammy-ros-humble-ros-base-latest
    strategy:
      fail-fast: false
      matrix:
        linter: [cppcheck, cpplint, uncrustify, flake8, pep257, lint_cmake, xmllint, copyright]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7

      - name: Get package names
        id: packages
        shell: bash
        run: |
          EXCLUDE_PACKAGES="vanjee_lidar_sdk vanjee_lidar_msg"
          PACKAGES=""
          while IFS=$'\t' read -r name path _; do
            if echo "$EXCLUDE_PACKAGES" | grep -qw "$name"; then
              echo "Excluding package: $name"
              continue
            fi
            if find "$path" \( -name "*.cpp" -o -name "*.hpp" -o -name "*.py" -o -name "*.h" -o -name "*.c" \) -print -quit | grep -q .; then
              PACKAGES="$PACKAGES $name"
            fi
          done < <(colcon list)
          echo "names=${PACKAGES# }" >> $GITHUB_OUTPUT

      - name: Run Linter
        if: steps.packages.outputs.names != ''
        env:
          AMENT_CPPCHECK_ALLOW_SLOW_VERSIONS: 1
        uses: ros-tooling/action-ros-lint@master
        with:
          linter: ${{ matrix.linter }}
          distribution: humble
          package-name: ${{ steps.packages.outputs.names }}

  # PR 머지 조건을 한 번에 설정하기 위한 통합 상태 체크 Job
  lint_success:
    needs: ament_lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more matrix jobs failed."
          exit 1
      - name: All linters passed
        run: echo "All linting jobs have passed successfully!"
