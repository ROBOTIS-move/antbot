name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # Includes 'ready_for_review' to trigger when a draft PR is marked as ready
    types: [opened, synchronize, reopened, ready_for_review]

# Prevent redundant builds by canceling previous runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Check which files changed to decide whether to run CI
  changes:
    runs-on: ubuntu-22.04
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - '!docs/**'
              - '!**.md'
              - '!LICENSE'
              - .github/workflows/**

  # 2. Run build and test only when source code is changed
  build:
    needs: changes
    if: |
      needs.changes.outputs.source == 'true' &&
      (github.event.pull_request.draft == false || github.event_name == 'push')
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        ros_distribution:
          - humble
        include:
          - docker_image: ubuntu:jammy
            ros_distribution: humble
            ros_version: 2

    container:
      image: ${{ matrix.docker_image }}

    steps:
      - name: Setup workspace
        run: mkdir -p antbot_ws/src

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: antbot_ws/src

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distribution }}

      - name: Check and Install ROS dependencies
        shell: bash
        run: |
          set -e
          source /opt/ros/${{ matrix.ros_distribution }}/setup.bash
          echo "--- Updating rosdep definitions ---"
          rosdep update
          echo "--- Installing system dependencies for ROS 2 ${{ matrix.ros_distribution }} ---"
          # -r flag continues even if some dependencies fail; essential for specialized hardware drivers
          rosdep install --from-paths antbot_ws/src --ignore-src -y -r --rosdistro ${{ matrix.ros_distribution }}

      - name: Build and Test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: ${{ matrix.ros_distribution }}
          # Dynamically fetch the additional_repos.repos file based on the current branch
          vcs-repo-file-url: "https://raw.githubusercontent.com/ROBOTIS-move/antbot/${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}/additional_repos.repos"

          # Configuration for colcon build and test:
          # antbot_camera: excluded due to ARM(aarch64)-only librectrl.so dependency
          # antbot_bringup: excluded due to exec_depend on antbot_camera
          # vanjee_lidar_sdk, vanjee_lidar_msg: excluded from test (external code, lint failures)
          colcon-defaults: |
            {
              "build": {
                "packages-skip": ["antbot_camera", "antbot_bringup"]
              },
              "test": {
                "packages-skip": ["antbot_camera", "antbot_bringup", "vanjee_lidar_sdk", "vanjee_lidar_msg"]
              }
            }

  # 3. Status gate for branch protection
  ROS_CI:
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || "${{ needs.build.result }}" == "cancelled" ]]; then
            echo "CI failed or was cancelled"
            exit 1
          fi
          echo "CI passed or was skipped (docs-only change)"
