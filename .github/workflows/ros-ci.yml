# The name of the workflow
name: CI

# Specifies the events that trigger the workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Defines a set of jobs to be run as part of the workflow
jobs:
  ROS_CI:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ros_distribution:
          - humble
        include:
          - docker_image: ubuntu:jammy
            ros_distribution: humble
            ros_version: 2
    container:
      image: ${{ matrix.docker_image }}
    steps:
      - name: Setup workspace
        run: mkdir -p antbot_ws/src

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: antbot_ws/src

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distribution }}

      - name: Check and Install ROS dependencies
        shell: bash
        run: |
          set -e
          source /opt/ros/${{ matrix.ros_distribution }}/setup.bash
          echo "--- Updating rosdep definitions ---"
          rosdep update
          echo "--- Installing system dependencies for ROS 2 ${{ matrix.ros_distribution }} ---"
          rosdep install --from-paths antbot_ws/src --ignore-src -y -r --rosdistro ${{ matrix.ros_distribution }}
          echo "--- Performing rosdep check for ROS 2 ${{ matrix.ros_distribution }} ---"
          if rosdep check --from-paths antbot_ws/src --ignore-src --rosdistro ${{ matrix.ros_distribution }}; then
            echo "--- rosdep check passed ---"
          else
            echo "--- rosdep check failed: Missing system dependencies or unresolvable keys. ---"
            exit 1
          fi

      - name: Build and Test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: ${{ matrix.ros_distribution }}
          vcs-repo-file-url: "https://raw.githubusercontent.com/ROBOTIS-move/antbot/${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}/additional_repos.repos"
          # antbot_camera: excluded due to ARM(aarch64)-only librectrl.so dependency
          colcon-extra-args: --packages-skip antbot_camera
          package-name: |
            antbot
            antbot_bringup
            antbot_description
            antbot_hw_interface
            antbot_imu
            antbot_interfaces
            antbot_libs
            antbot_swerve_controller
            antbot_teleop
            vanjee_lidar_msg
            vanjee_lidar_sdk
